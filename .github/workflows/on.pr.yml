name: API Build

on:
  pull_request:
    branches:
      - grad-release
      - main
    paths:
      - 'api/**'
jobs:
  quality_profile:

    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 18
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: 18
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-5Jun-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-5Jun-
      - name: Run unit tests
        run: mvn -f pom.xml clean package
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
      - name: Check Sonar inputs
        shell: bash
        run: |
          [ -n "${{ secrets.SONAR_TOKEN }}" ] && echo "SONAR_TOKEN present" || echo "SONAR_TOKEN missing"
          [ -n "${{ vars.SONAR_HOST_URL }}" ] && echo "SONAR_HOST_URL present" || echo "SONAR_HOST_URL missing"
          [ -n "${{ vars.SONAR_ORG }}" ] && echo "SONAR_ORG present" || echo "SONAR_ORG missing"
          [ -n "${{ vars.SONAR_PROJECT_KEY }}" ] && echo "SONAR_PROJECT_KEY present" || echo "SONAR_PROJECT_KEY missing"
      - name: Run Sonar Analysis
        run: mvn sonar:sonar
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.host.url=${{ vars.SONAR_HOST_URL }}
          -Dsonar.organization=${{ vars.SONAR_ORG }}
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
